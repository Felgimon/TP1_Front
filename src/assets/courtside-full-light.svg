<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <defs>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#E8450E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="60%" stop-color="#E8450E"/>
      <stop offset="100%" stop-color="#C43509"/>
    </linearGradient>
  </defs>

  <!-- Basketball icon -->
  <circle cx="36" cy="40" r="26" fill="url(#ballGrad)"/>
  <path d="M36 14 L36 66" stroke="#1A1A2E" stroke-width="2.2" stroke-linecap="round" opacity="0.45"/>
  <path d="M10 40 L62 40" stroke="#1A1A2E" stroke-width="2.2" stroke-linecap="round" opacity="0.45"/>
  <path d="M13 23 C27 29, 45 29, 59 23" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M13 57 C27 51, 45 51, 59 57" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35"/>
  <ellipse cx="27" cy="29" rx="7" ry="4.5" fill="white" opacity="0.2" transform="rotate(-25 27 29)"/>

  <!-- COURT text — dark for light backgrounds -->
  <text x="76" y="36" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="29" fill="#1A1A2E" letter-spacing="-0.5">COURT</text>
  <text x="194" y="36" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="29" fill="url(#accentGrad)" letter-spacing="-0.5">SIDE</text>

  <!-- Subtitle -->
  <text x="76" y="56" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="11.5" fill="#999" letter-spacing="5.5">NBA TRACKER</text>

  <!-- Accent bar -->
  <rect x="76" y="63" width="48" height="2.5" rx="1.25" fill="url(#accentGrad)"/>
</svg>
