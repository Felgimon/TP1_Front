<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <defs>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#E8450E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="60%" stop-color="#E8450E"/>
      <stop offset="100%" stop-color="#C43509"/>
    </linearGradient>
  </defs>

  <!-- Basketball -->
  <circle cx="80" cy="28" r="22" fill="url(#ballGrad)"/>
  <path d="M80 6 L80 50" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <path d="M58 28 L102 28" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <path d="M61 14 C72 19, 88 19, 99 14" stroke="#1A1A2E" stroke-width="1.6" fill="none" opacity="0.35"/>
  <path d="M61 42 C72 37, 88 37, 99 42" stroke="#1A1A2E" stroke-width="1.6" fill="none" opacity="0.35"/>
  <ellipse cx="72" cy="19" rx="6" ry="4" fill="white" opacity="0.16" transform="rotate(-25 72 19)"/>

  <!-- COURTSIDE text -->
  <text x="80" y="72" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="22" fill="#F0F0F0" letter-spacing="-0.3" text-anchor="middle">COURT<tspan fill="url(#accentGrad)">SIDE</tspan></text>

  <!-- Subtitle -->
  <text x="80" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="9" fill="#777" letter-spacing="4.5" text-anchor="middle">NBA TRACKER</text>
</svg>
